<head>

<style>
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
  :root{--bg:#f8f5f0;--text:#1c1612;--accent:#c47f2a;--muted:rgba(28,22,18,0.45)}
  body{background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:2rem;text-align:center;}

  .logo span{color:var(--accent)}
  .code{font-family:'Bebas Neue',sans-serif;font-size:clamp(5rem,20vw,10rem);line-height:1;letter-spacing:0.04em;color:var(--accent);opacity:0.15;}
  h1{font-family:'Bebas Neue',sans-serif;font-size:clamp(2rem,6vw,3.5rem);letter-spacing:0.04em;margin-top:-1rem;margin-bottom:1rem;}
  p{color:var(--muted);font-size:0.95rem;line-height:1.7;max-width:420px;margin:0 auto 2rem;}
  .btn{display:inline-block;background:var(--accent);color:#fff;font-family:'DM Sans',sans-serif;font-weight:700;font-size:0.85rem;letter-spacing:0.08em;text-transform:uppercase;padding:0.85rem 2.5rem;border-radius:10px;text-decoration:none;transition:background 0.2s;}

<a href="/" class="btn">Browse flight deals →</a>
<p class="counter" id="counter">Redirecting in <span id="secs">5</span> seconds…</p>
<script>
  var s = 5;
  var t = setInterval(function() {
    s--;
    document.getElementById('secs').textContent = s;
    if (s <= 0) { clearInterval(t); window.location.href = '/'; }
  }, 1000);
</script>
